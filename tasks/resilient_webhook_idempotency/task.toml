version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
# Add more environment variables requried
TRIGGER_PROJECT_REF = "${TRIGGER_PROJECT_REF}"
TRIGGER_SECRET_KEY = "${TRIGGER_SECRET_KEY}"
TRIGGER_CREDENTIAL_CONFIG_JSON = "${TRIGGER_CREDENTIAL_CONFIG_JSON}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
POCHI_LOG = "debug"
# Add more environment variables requried
TRIGGER_PROJECT_REF = "${TRIGGER_PROJECT_REF}"
TRIGGER_SECRET_KEY = "${TRIGGER_SECRET_KEY}"
TRIGGER_CREDENTIAL_CONFIG_JSON = "${TRIGGER_CREDENTIAL_CONFIG_JSON}"

[solution.env]
